[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.gd", "php82Extensions.zip"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan owner:ensure && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
